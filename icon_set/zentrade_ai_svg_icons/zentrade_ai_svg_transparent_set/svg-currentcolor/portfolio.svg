<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Portfolio Icon">

<style>
  .bg { fill: #070812; }
  .ring { fill: none; stroke: currentColor; stroke-width: 5; filter: url(#glow); }
  .line { fill: none; stroke: currentColor; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); }
  .line2 { fill: none; stroke: currentColor; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); }
  .fill { fill: currentColor; filter: url(#glow); }
  .fill2 { fill: currentColor; filter: url(#glow); }
  .txt { font-family: Orbitron, Arial, sans-serif; font-weight: 700; fill: #e9fbff; letter-spacing: 2px; }
</style>
<defs>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>


