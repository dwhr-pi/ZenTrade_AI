<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="ZenTrade AI GitHub Avatar">

<style>
  .bg { fill: #f6fbff; }
  .ring { fill: none; stroke: url(#neon); stroke-width: 5; filter: url(#glow); }
  .line { fill: none; stroke: #23e6ff; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); }
  .line2 { fill: none; stroke: #ff4fd8; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); }
  .fill { fill: #23e6ff; filter: url(#glow); }
  .fill2 { fill: #ff4fd8; filter: url(#glow); }
  .txt { font-family: Orbitron, Arial, sans-serif; font-weight: 700; fill: #08111f; letter-spacing: 2px; }
</style>
<defs>
  <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#23e6ff"/>
    <stop offset="50%" stop-color="#915cff"/>
    <stop offset="100%" stop-color="#ff4fd8"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<rect class="bg" x="24" y="24" width="464" height="464" rx="96"/>

<circle class="ring" cx="256" cy="256" r="176"/>
<path class="line" d="M172 304c38-102 130-102 168 0"/>
<path class="line2" d="M198 216c22-48 94-48 116 0"/>
<circle class="fill" cx="220" cy="252" r="11"/>
<circle class="fill2" cx="292" cy="252" r="11"/>
<path class="line" d="M186 366h140"/>
<text class="txt" x="256" y="424" font-size="72" text-anchor="middle">ZT</text>

</svg>
