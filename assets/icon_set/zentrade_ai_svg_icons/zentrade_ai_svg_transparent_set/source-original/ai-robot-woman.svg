<path class="line" d="M172 180c14-70 154-70 168 0"/>
<path class="line2" d="M204 238c32 28 72 28 104 0"/>
<circle class="fill" cx="216" cy="190" r="12"/>
<circle class="fill2" cx="296" cy="190" r="12"/>
<path class="line" d="M150 282c48 68 164 68 212 0"/>
<path class="line2" d="M128 410c34-78 222-78 256 0"/>
<path class="line" d="M126 168h-36v74h40"/>
<path class="line2" d="M386 168h36v74h-40"/>

</svg>
