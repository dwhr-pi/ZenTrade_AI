
<!DOCTYPE html>
<html>
<head><title>Balkendiagramm</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body><canvas id="chart"></canvas>
<script>
const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Miete', 'Essen', 'Transport', 'Freizeit'],
        datasets: [{
            label: 'Ausgaben (€)',
            data: [800, 300, 150, 200],
            backgroundColor: 'green'
        }]
    }
});
</script></body></html>
