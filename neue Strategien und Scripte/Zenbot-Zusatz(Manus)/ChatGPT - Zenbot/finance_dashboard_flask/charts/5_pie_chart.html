
<!DOCTYPE html>
<html>
<head><title>Pie Chart</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body><canvas id="chart"></canvas>
<script>
const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['Aktien', 'Anleihen', 'Immobilien', 'Cash'],
        datasets: [{
            data: [40, 30, 20, 10],
            backgroundColor: ['red', 'blue', 'green', 'gray']
        }]
    }
});
</script></body></html>
