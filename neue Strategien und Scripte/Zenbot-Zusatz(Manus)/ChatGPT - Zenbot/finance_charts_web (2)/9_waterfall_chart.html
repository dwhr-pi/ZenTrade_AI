
<!DOCTYPE html>
<html>
<head><title>Waterfall Chart</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-waterfall"></script></head>
<body><canvas id="chart"></canvas>
<script>
const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
    type: 'waterfall',
    data: {
        labels: ['Start', 'Umsatz', 'Kosten', 'Gewinn'],
        datasets: [{
            label: 'Cashflow',
            data: [1000, { y: 500 }, { y: -200 }, { y: 1300 }],
            backgroundColor: 'orange'
        }]
    }
});
</script></body></html>
